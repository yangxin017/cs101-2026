<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>資工選課表 - HW2</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        /* 保留您原本的 CSS 樣式 */
        table {
            font-family: Arial, Helvetica, sans-serif;
            border-collapse: collapse;
            width: 100%;
        }

        td, th {
            border: 1px solid #ddd;
            padding: 6px;
        }

        tr:nth-child(even) {
            background-color: #f2f2f2;
        }

        tr:hover {
            background-color: #ddd;
        }

        th {
            padding-top: 12px;
            padding-bottom: 12px;
            text-align: left;
            background-color: #04AA6D;
            color: white;
        }

        /* 按鈕樣式優化 [cite: 57, 115] */
        .btn-change {
            margin-top: 15px;
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h2>資工選課表</h2>

    <table id="csie">
        <thead>
            <tr>
                <th>開課單位</th>
                <th>課程名稱</th>
                <th>授課教師</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>資工系</td>
                <td>
                    <a href="#" 
                       data-bs-toggle="popover" 
                       data-bs-html="true"
                       title="課程詳細資料" 
                       data-bs-content="開課序號: A2337<br>人數限制: 10-60人<br><a href='https://catalog.cgu.edu.tw/coursedata?sectionid=A2337' target='_blank'>按此查看課程大綱</a>">
                       物件導向軟體設計
                    </a>
                </td>
                <td>黃崇源</td>
            </tr>
            <tr>
                <td>資工系</td>
                <td>計算機網路實驗</td>
                <td>李春良</td>
            </tr>
            <tr>
                <td>資工系</td>
                <td>作業系統實務</td>
                <td>張哲維</td>
            </tr>
            <tr>
                <td>資工系</td>
                <td>生物統計</td>
                <td>陳光武</td>
            </tr>
            <tr>
                <td>資工系</td>
                <td>通訊系統</td>
                <td>陳仁暉</td>
            </tr>
            <tr>
                <td>資工系</td>
                <td>軟硬體專題(2)</td>
                <td>魏志達</td>
            </tr>
        </tbody>
    </table>

    <button class="btn-change" onclick="changeResult()">Change</button>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // 實作檔案第 3 頁要求的 JavaScript 邏輯 [cite: 100-104]
        function changeResult() {
            var myTable = document.getElementById("csie");
            // 將第一列課程的授課教師欄位更新為「李春良」 [cite: 102]
            myTable.rows[1].cells[2].innerHTML = "李春良";
        }

        // 初始化所有 Popover，並啟用 HTML 內容支援 [cite: 73, 118]
        var popoverTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="popover"]'))
        var popoverList = popoverTriggerList.map(function (popoverTriggerEl) {
            return new bootstrap.Popover(popoverTriggerEl)
        })
    </script>

</body>
</html>
