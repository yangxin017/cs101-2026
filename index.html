<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>資工選課表</title>
    <style>
        /* 檔案第 2 頁要求的 CSS 樣式 */
        table {
            font-family: Arial, Helvetica, sans-serif;
            border-collapse: collapse;
            width: 100%;
        }

        td, th {
            border: 1px solid #ddd;
            padding: 6px;
        }

        /* 偶數列背景色 */
        tr:nth-child(even) {
            background-color: #f2f2f2;
        }

        /* 滑鼠滑過效果 */
        tr:hover {
            background-color: #ddd;
        }

        /* 標題列樣式 */
        th {
            padding-top: 12px;
            padding-bottom: 12px;
            text-align: left;
            background-color: #04AA6D; /* 關鍵綠色背景 */
            color: white;
        }
    </style>
</head>
<body>

    <h2>資工選課表</h2>

    <table>
        <thead>
            <tr>
                <th>開課單位</th>
                <th>課程名稱</th>
                <th>授課教師</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>資工系</td>
                <td>物件導向軟體設計</td>
                <td>黃崇源</td>
            </tr>
            <tr>
                <td>資工系</td>
                <td>計算機網路實驗</td>
                <td>李春良</td>
            </tr>
            <tr>
                <td>資工系</td>
                <td>作業系統實務</td>
                <td>張哲維</td>
            </tr>
            <tr>
                <td>資工系</td>
                <td>生物統計</td>
                <td>陳光武</td>
            </tr>
            <tr>
                <td>資工系</td>
                <td>通訊系統</td>
                <td>陳仁暉</td>
            </tr>
            <tr>
                <td>資工系</td>
                <td>軟硬體專題(2)</td>
                <td>魏志達</td>
            </tr>
        </tbody>
    </table>

</body>
</html>
